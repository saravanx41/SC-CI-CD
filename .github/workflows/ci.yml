name: Smart Contract Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─────────────────────────────────────────────
  # SLITHER (ONLY /contracts)
  # ─────────────────────────────────────────────
  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Slither (contracts only)
        uses: crytic/slither-action@v0.4.0
        continue-on-error: true   # ✅ prevents CI crash on bad contracts
        with:
          target: "contracts"     # ✅ ONLY this folder
          slither-args: "--exclude-dependencies --exclude-informational"
          fail-on: high
          sarif: results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: results.sarif


  # ─────────────────────────────────────────────
  # MYTHRIL (ONLY /contracts)
  # ─────────────────────────────────────────────
  mythril:
    name: Mythril Symbolic Execution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mythril
        run: pip install mythril==0.24.7

      - name: Run Mythril (contracts only)
        run: |
          mkdir -p mythril-reports
          FAILED=0

          files=$(find contracts -name "*.sol")

          if [ -z "$files" ]; then
            echo "⚠️ No contracts found"
            exit 0
          fi

          for contract in $files; do
            echo "🔍 $contract"

            myth analyze "$contract" \
              --execution-timeout 120 \
              --output json \
              > mythril-reports/$(basename "$contract" .sol).json 2>&1 || true

            if grep -q '"severity": "High"' mythril-reports/$(basename "$contract" .sol).json; then
              echo "❌ HIGH issue in $contract"
              FAILED=1
            fi
          done

          exit $FAILED

      - name: Upload Mythril reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mythril-reports
          path: mythril-reports/


  # ─────────────────────────────────────────────
  # SECURITY GATE
  # ─────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [slither, mythril]
    if: always()

    steps:
      - name: Final Check
        run: |
          echo "Slither: ${{ needs.slither.result }}"
          echo "Mythril: ${{ needs.mythril.result }}"

          if [[ "${{ needs.mythril.result }}" != "success" ]]; then
            echo "❌ Mythril failed"
            exit 1
          fi

          # Slither may fail due to compilation → allow but warn
          if [[ "${{ needs.slither.result }}" != "success" ]]; then
            echo "⚠️ Slither had issues (likely compilation)"
          fi

          echo "✅ Security checks complete"
