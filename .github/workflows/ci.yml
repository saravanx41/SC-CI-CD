name: Smart Contract Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  check-contracts:
    runs-on: ubuntu-latest
    outputs:
      has_contracts: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if ls *.sol 1> /dev/null 2>&1 || ls contracts/*.sol 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    needs: check-contracts
    if: needs.check-contracts.outputs.has_contracts == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither Analysis
        run: |
          slither . \
            --json slither-report.json \
            --exclude-dependencies \
            --exclude-informational || true

      - name: Check for HIGH/MEDIUM Issues
        run: |
          python3 << 'EOF'
          import json
          import sys

          try:
              with open("slither-report.json") as f:
                  data = json.load(f)
          except:
              print("❌ No Slither report generated")
              sys.exit(1)

          detectors = data.get("results", {}).get("detectors", [])
          
          if not detectors:
              print("✅ No issues found by Slither")
              sys.exit(0)

          high_issues = []
          medium_issues = []

          for detector in detectors:
              impact = detector.get("impact", "").lower()
              confidence = detector.get("confidence", "").lower()
              check = detector.get("check", "Unknown")
              description = detector.get("description", "")
              
              if impact == "high":
                  high_issues.append(f"  [{check}] {description[:100]}")
              elif impact == "medium" and confidence == "high":
                  medium_issues.append(f"  [{check}] {description[:100]}")

          print("\n" + "="*70)
          if high_issues:
              print(f"🔴 CRITICAL: {len(high_issues)} HIGH severity issues detected:")
              for issue in high_issues:
                  print(issue)
              print("="*70)
              sys.exit(1)
          
          if medium_issues:
              print(f"🟠 WARNING: {len(medium_issues)} MEDIUM severity issues detected:")
              for issue in medium_issues:
                  print(issue)
              print("="*70)
              sys.exit(1)

          print("✅ No HIGH or MEDIUM severity issues found")
          print("="*70)
          sys.exit(0)
          EOF

      - name: Run Slither SARIF
        run: |
          slither . \
            --sarif results.sarif || true

      - name: Upload SARIF
        if: hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-reports
          path: slither-report.json

  mythril:
    name: Mythril Analysis
    runs-on: ubuntu-latest
    needs: check-contracts
    if: needs.check-contracts.outputs.has_contracts == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mythril
        run: pip install mythril==0.24.7

      - name: Run Mythril
        run: |
          mkdir -p mythril-reports
          FAILED=0

          for contract in *.sol contracts/*.sol; do
            [ -f "$contract" ] || continue
            echo "🔍 Analyzing: $contract"
            myth analyze "$contract" \
              --execution-timeout 120 \
              --output json \
              > "mythril-reports/$(basename "$contract" .sol).json" 2>&1 || true
          done

          # Check for HIGH severity issues
          if grep -r '"severity": "High"' mythril-reports/ 2>/dev/null; then
            echo "❌ HIGH severity issues found in Mythril analysis"
            exit 1
          fi
          
          echo "✅ No HIGH severity issues in Mythril"
          exit 0

      - name: Upload Mythril Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mythril-reports
          path: mythril-reports/

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [slither, mythril]
    if: always()

    steps:
      - name: Check Security Results
        run: |
          echo "📋 Security Scan Results:"
          echo "  Slither: ${{ needs.slither.result }}"
          echo "  Mythril: ${{ needs.mythril.result }}"

          if [[ "${{ needs.slither.result }}" == "failure" ]] || \
             [[ "${{ needs.mythril.result }}" == "failure" ]]; then
            echo ""
            echo "❌ SECURITY GATE FAILED"
            echo "Security vulnerabilities detected. Fix them before merging."
            exit 1
          fi

          echo ""
          echo "✅ All security checks passed!"
