name: Smart Contract Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─────────────────────────────────────────────
  # SLITHER
  # ─────────────────────────────────────────────
  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Slither (all contracts)
        uses: crytic/slither-action@v0.4.0
        with:
          target: "."   # ✅ FIXED (scan entire repo)
          slither-args: >
            --exclude-dependencies
            --exclude-informational
            --detect reentrancy-eth,reentrancy-no-eth,tx-origin,
            unprotected-upgrade,arbitrary-send-eth,
            controlled-delegatecall,suicidal,
            locked-ether,msg-value-loop
          fail-on: high
          sarif: results.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4   # ✅ FIXED
        with:
          sarif_file: results.sarif

      - name: Upload Slither report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: results.sarif


  # ─────────────────────────────────────────────
  # MYTHRIL
  # ─────────────────────────────────────────────
  mythril:
    name: Mythril Symbolic Execution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mythril
        run: pip install mythril==0.24.7

      - name: Run Mythril
        run: |
          mkdir -p mythril-reports
          FAILED=0

          files=$(find . -name "*.sol")

          if [ -z "$files" ]; then
            echo "⚠️ No contracts found"
            exit 0
          fi

          for contract in $files; do
            echo "🔍 $contract"

            myth analyze "$contract" \
              --execution-timeout 120 \
              --output json \
              > mythril-reports/$(basename "$contract" .sol).json 2>&1 || true

            if grep -q '"severity": "High"' mythril-reports/$(basename "$contract" .sol).json; then
              echo "❌ HIGH issue in $contract"
              FAILED=1
            fi
          done

          exit $FAILED

      - name: Upload Mythril reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mythril-reports
          path: mythril-reports/


  # ─────────────────────────────────────────────
  # SBOM + CVE
  # ─────────────────────────────────────────────
  sbom-scan:
    name: SBOM + CVE Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft . -o cyclonedx-json --file sbom.json

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan CVEs
        run: grype sbom:sbom.json --fail-on high

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json


  # ─────────────────────────────────────────────
  # DEPENDENCY AUDIT
  # ─────────────────────────────────────────────
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: npm audit
        if: hashFiles('package.json') != ''
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Go audit
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run govulncheck
        if: hashFiles('go.mod') != ''
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...


  # ─────────────────────────────────────────────
  # SECURITY GATE
  # ─────────────────────────────────────────────
  security-gate:
    runs-on: ubuntu-latest
    needs: [slither, mythril, sbom-scan, dependency-audit]
    if: always()

    steps:
      - name: Final Gate
        run: |
          echo "Slither: ${{ needs.slither.result }}"
          echo "Mythril: ${{ needs.mythril.result }}"
          echo "SBOM: ${{ needs.sbom-scan.result }}"
          echo "Deps: ${{ needs.dependency-audit.result }}"

          if [[ "${{ needs.slither.result }}" != "success" ]] || \
             [[ "${{ needs.mythril.result }}" != "success" ]] || \
             [[ "${{ needs.sbom-scan.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-audit.result }}" != "success" ]]; then
            echo "❌ Security Gate FAILED"
            exit 1
          fi

          echo "✅ All checks passed"
