name: Smart Contract Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  check-contracts:
    name: Check Solidity Files
    runs-on: ubuntu-latest
    outputs:
      has_contracts: ${{ steps.check.outputs.exists }}
      contract_list: ${{ steps.check.outputs.contract_list }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(find . -type f -name "*.sol" ! -path "./node_modules/*" | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "contract_list=" >> "$GITHUB_OUTPUT"
            echo "No Solidity files found"
            exit 0
          fi

          printf 'Found Solidity files:\n'
          printf '  %s\n' "${files[@]}"

          {
            echo "exists=true"
            echo "contract_list<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    needs: check-contracts
    if: needs.check-contracts.outputs.has_contracts == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer

      - name: Run Slither on each Solidity file
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p slither-reports
          mkdir -p slither-sarif

          had_analysis_error=0
          had_findings=0

          while IFS= read -r contract; do
            [ -n "$contract" ] || continue

            base="$(basename "$contract" .sol)"
            json_out="slither-reports/${base}.json"
            sarif_out="slither-sarif/${base}.sarif"

            echo "=================================================="
            echo "Analyzing: $contract"
            echo "=================================================="

            # Do NOT use `|| true` here. If Slither cannot analyze the file,
            # we want to know and mark the job accordingly.
            if ! slither "$contract" \
              --json "$json_out" \
              --sarif "$sarif_out" \
              --exclude-dependencies \
              --exclude-informational; then
              echo "❌ Slither failed to analyze $contract"
              had_analysis_error=1
              continue
            fi

            if [ ! -s "$json_out" ]; then
              echo "❌ Missing or empty JSON report for $contract"
              had_analysis_error=1
              continue
            fi

            python3 - "$json_out" << 'PY'
import json, sys
path = sys.argv[1]

with open(path, "r", encoding="utf-8") as f:
    data = json.load(f)

# Slither JSON top-level structure includes success/error/results. :contentReference[oaicite:3]{index=3}
success = data.get("success", True)
error = data.get("error")
detectors = data.get("results", {}).get("detectors", [])

if success is False or error:
    print(f"❌ Slither reported analysis error in {path}: {error}")
    sys.exit(2)

high = []
medium_high_conf = []

for d in detectors:
    impact = str(d.get("impact", "")).lower()
    confidence = str(d.get("confidence", "")).lower()
    check = d.get("check", "Unknown")
    description = str(d.get("description", "")).strip().replace("\n", " ")

    if impact == "high":
        high.append((check, description[:160]))
    elif impact == "medium" and confidence == "high":
        medium_high_conf.append((check, description[:160]))

print(f"Detectors returned: {len(detectors)}")

if high:
    print(f"🔴 HIGH findings: {len(high)}")
    for check, desc in high:
        print(f"  [{check}] {desc}")
    sys.exit(10)

if medium_high_conf:
    print(f"🟠 MEDIUM/HIGH-CONFIDENCE findings: {len(medium_high_conf)}")
    for check, desc in medium_high_conf:
        print(f"  [{check}] {desc}")
    sys.exit(11)

print("✅ No HIGH or MEDIUM/HIGH-CONFIDENCE findings in this file")
PY

            rc=$?
            if [ "$rc" -eq 10 ] || [ "$rc" -eq 11 ]; then
              had_findings=1
            elif [ "$rc" -eq 2 ]; then
              had_analysis_error=1
            elif [ "$rc" -ne 0 ]; then
              had_analysis_error=1
            fi

          done <<< "${{ needs.check-contracts.outputs.contract_list }}"

          echo "had_analysis_error=$had_analysis_error"
          echo "had_findings=$had_findings"

          if [ "$had_analysis_error" -ne 0 ]; then
            echo "❌ Slither analysis failed for one or more files"
            exit 1
          fi

          if [ "$had_findings" -ne 0 ]; then
            echo "❌ Slither found blocking issues"
            exit 1
          fi

          echo "✅ Slither completed successfully with no blocking findings"

      - name: Upload SARIF files
        if: always() && hashFiles('slither-sarif/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: slither-sarif

      - name: Upload Slither artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-reports
          path: |
            slither-reports/
            slither-sarif/

  mythril:
    name: Mythril Analysis
    runs-on: ubuntu-latest
    needs: check-contracts
    if: needs.check-contracts.outputs.has_contracts == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mythril
        run: |
          python -m pip install --upgrade pip
          pip install mythril==0.24.7

      - name: Run Mythril on each Solidity file
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p mythril-reports
          had_high=0

          while IFS= read -r contract; do
            [ -n "$contract" ] || continue

            base="$(basename "$contract" .sol)"
            out="mythril-reports/${base}.json"

            echo "=================================================="
            echo "Analyzing: $contract"
            echo "=================================================="

            myth analyze "$contract" \
              --execution-timeout 120 \
              --output json \
              > "$out" 2>&1 || true

            if grep -q '"severity": "High"' "$out"; then
              echo "❌ HIGH severity issue found in $contract"
              had_high=1
            else
              echo "✅ No HIGH severity issue found in $contract"
            fi
          done <<< "${{ needs.check-contracts.outputs.contract_list }}"

          if [ "$had_high" -ne 0 ]; then
            exit 1
          fi

      - name: Upload Mythril reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mythril-reports
          path: mythril-reports/

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [slither, mythril]
    if: always()

    steps:
      - name: Check Security Results
        shell: bash
        run: |
          set -euo pipefail

          echo "📋 Security Scan Results:"
          echo "  Slither: ${{ needs.slither.result }}"
          echo "  Mythril: ${{ needs.mythril.result }}"

          if [[ "${{ needs.slither.result }}" == "failure" ]] || \
             [[ "${{ needs.mythril.result }}" == "failure" ]]; then
            echo
            echo "❌ SECURITY GATE FAILED"
            echo "Security vulnerabilities or analysis failures detected."
            exit 1
          fi

          echo
          echo "✅ All security checks passed"
